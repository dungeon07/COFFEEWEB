<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Coffee Management System</title>
    <link rel="stylesheet" href="register.css">
    <!-- Link Font Awesome để dùng icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="register-box">
            <h1>Coffee Management System</h1>
            <h2 class="subtitle">Đăng ký</h2>
            
            <form id="registerForm">
                <div class="input-group">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="username" placeholder="Name" required>
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="email" placeholder="Email" required>
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" placeholder="Password" required>
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="confirmPassword" placeholder="Confirm password" required>
                </div>

                <button type="submit" class="btn-register">Đăng ký</button>
                
                <p class="footer-text">
                    Đã có tài khoản? <a href="login.html">Đăng nhập</a>
                </p>
            </form>
        </div>
    </div>

    <script>
        // Logic kiểm tra mật khẩu và lưu vào localStorage
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value;
            const confirmPass = document.getElementById('confirmPassword').value;

            if (pass !== confirmPass) {
                alert("Mật khẩu xác nhận không khớp!");
                return;
            }

            // Lấy danh sách users hiện tại từ localStorage
            let users = JSON.parse(localStorage.getItem('users')) || [];

            // Kiểm tra xem email đã tồn tại chưa
            if (users.some(u => u.email === email)) {
                alert("Email này đã được đăng ký!");
                return;
            }

            // Thêm user mới
            users.push({
                name: username,
                email: email,
                password: pass
            });

            localStorage.setItem('users', JSON.stringify(users));
            alert("Đăng ký thành công!");
            window.location.href = "login.html";
        });
    </script>
</body>
</html>
