<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Shop - Trang chủ</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">Coffee<span>Bee</span></div>
            <ul class="nav-links">
                <li><a href="index.html">Trang chủ</a></li>
                <li><a href="#">Thực đơn</a></li>
                <li><a href="login.html" class="btn-login">Đăng nhập</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>Khởi đầu ngày mới với CoffeeBee</h1>
            <p>Hương vị cà phê nguyên chất, đậm đà từ những hạt cà phê tuyển chọn.</p>
            <a href="#" class="btn-main">Thử ngay</a>
        </div>
    </section>

    <section class="products">
        <h2>Sản phẩm nổi bật</h2>
        <div class="product-grid">
            <div class="product-card">
                <img src="https://via.placeholder.com/200" alt="Cafe">
                <h3>Espresso</h3>
                <p>35.000đ</p>
            </div>
            <div class="product-card">
                <img src="https://via.placeholder.com/200" alt="Cafe">
                <h3>Capuchino</h3>
                <p>45.000đ</p>
            </div>
            <div class="product-card">
                <img src="https://via.placeholder.com/200" alt="Cafe">
                <h3>Latte</h3>
                <p>40.000đ</p>
            </div>
        </div>
    </section>
</body>
</html>
